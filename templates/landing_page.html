{% extends 'base.html' %}
{% block title %}Welcome{% endblock %}
{% block content %}
<div class="text-center py-5">
    <h1>Welcome to Goodreads</h1>
    <p class="lead">Track books you're reading, want to read, and have read.</p>
    {% if not user.is_authenticated %}
        <a href="{% url 'accounts:register' %}" class="btn btn-primary me-2">Sign Up</a>
        <a href="{% url 'accounts:login' %}"    class="btn btn-outline-secondary">Log In</a>
    {% endif %}
</div>
<a href="{% url 'books:home' %}">Books</a>
{% endblock %}
