{% extends 'base.html' %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2>Profile</h2>
    <ul class="list-group mt-3">
      <li class="list-group-item"><strong>Username:</strong> {{ user.username }}</li>
      <li class="list-group-item"><strong>Email:</strong> {{ user.email }}</li>
      <li class="list-group-item"><strong>Joined:</strong> {{ user.date_joined|date:"d M Y" }}</li>
    </ul>
    <a href="{% url 'accounts:logout' %}" class="btn btn-danger mt-3">Logout</a>
  </div>
</div>
{% endblock %}
